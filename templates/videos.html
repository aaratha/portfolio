<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Videos</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="content">
      <div id="videos">
        <div id="gallery">
          {{range .Videos}}
          <div>
            <iframe
              src="{{.}}"
              class="video"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
            ></iframe>
          </div>
          {{end}}
        </div>
      </div>
    </div>
  </body>
</html>
